name: Sync images to Cloudflare R2

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *'  # every day at 06:00 UTC

jobs:
  sync-images:
    runs-on: ubuntu-latest
    steps:
      # ← ADD THIS
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Download official imgs.zip
        run: |
          curl -L https://get.5e.tools/imgs.zip -o imgs.zip

      - name: Unzip into img/
        run: |
          mkdir -p img
          unzip -o imgs.zip -d img

      - name: Install rclone
        run: |
          curl https://rclone.org/install.sh | sudo bash

      - name: Configure rclone for R2
        run: |
          mkdir -p ~/.config/rclone
          cat <<EOF > ~/.config/rclone/rclone.conf
          [cf-r2]
          type = s3
          provider = Cloudflare
          access_key_id     = ${{ secrets.R2_ACCESS_KEY_ID }}
          secret_access_key = ${{ secrets.R2_SECRET_ACCESS_KEY }}
          endpoint          = ${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com
          region            = auto
          insecure_skip_verify = true
          EOF

      - name: Dry‑run upload
        run: |
          rclone sync img cf-r2:${{ secrets.R2_BUCKET_NAME }}/img \
            --dry-run --progress

      - name: Actual upload to R2
        if: ${{ success() }}
        run: |
          rclone sync img cf-r2:${{ secrets.R2_BUCKET_NAME }}/img \
            --progress